# ~/.tmux.conf — workspace config for running multiple tasks
# Prefix stays the default Ctrl-b. Press it, release, then the key below.

# --- Quality of life ---
set -g mouse on               # click panes/windows, scroll, drag to resize
set -g history-limit 50000    # lots of scrollback
set -sg escape-time 10        # snappier (better with vim / Claude Code)
set -g base-index 1           # windows start at 1 (matches the keyboard)
setw -g pane-base-index 1
set -g renumber-windows on    # close a window -> others renumber, no gaps
setw -g mode-keys vi          # vi keys in scroll/copy mode

# --- Easier splits (open in the current directory) ---
bind | split-window -h -c "#{pane_current_path}"   # prefix |  -> left/right
bind - split-window -v -c "#{pane_current_path}"   # prefix -  -> top/bottom
bind c new-window -c "#{pane_current_path}"        # new window in same dir
unbind '"'
unbind %

# --- Move between panes with prefix + h/j/k/l ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Reload this config with prefix + r ---
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# --- Attention colors ---
# Claude Code hooks color each window by its session state via `claude-tmux-flag`:
#   purple = working, red = needs input, green = done.
# State is hook-driven (reflects the session, not whether you've looked), so there is
# no switch-into-window auto-clear — a tab changes color only when its session changes state.

# --- Status bar: session name on the left, clock on the right ---
set -g status-style "bg=colour234,fg=colour250"
set -g status-left "#[bold] #S #[default] "
set -g status-left-length 20
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour39,fg=colour234,bold"
set -g status-right "#[fg=colour244]%a %b %d  %H:%M "
